---
# validate-secrets.yml — Active credential testing against live services
#
# Fetches secrets from OpenBao and tests each against its service:
#   - DB passwords: psql connection test
#   - API tokens: HTTP request with auth
#   - Redis: redis-cli ping with auth
#
# Does NOT modify anything — read-only verification.
# Reports: VALID, INVALID, UNREACHABLE, SKIPPED
#
# Usage: -e "target_service=netbox_svc"

- name: "Validate secrets for {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  become: false
  vars:
    target_service: "ungrouped"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

  tasks:
    - name: "Authenticate to OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
        status_code: [200]
      register: _bao_auth
      delegate_to: localhost
      no_log: true

    - name: "Fetch secrets from OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200, 404]
      register: _bao_data
      delegate_to: localhost
      no_log: true

    - name: "Set secrets fact"
      ansible.builtin.set_fact:
        _secrets: "{{ _bao_data.json.data.data | default({}) }}"
      no_log: true

    - name: "Validate service URL reachable"
      ansible.builtin.uri:
        url: "{{ _secrets.url | default(service_url | default('')) }}"
        status_code: [200, 301, 302, 403]
        validate_certs: false
        timeout: 10
      register: _url_check
      ignore_errors: true
      when: _secrets.url is defined or service_url is defined

    - name: "Validate Postgres password"
      ansible.builtin.shell: |
        PGPASSWORD='{{ _secrets.postgres_password }}' psql -h localhost -U netbox -d netbox -c 'SELECT 1' 2>&1 | head -3
      register: _pg_check
      ignore_errors: true
      changed_when: false
      no_log: true
      when: _secrets.postgres_password is defined

    - name: "Validate Redis password"
      ansible.builtin.shell: |
        redis-cli -a '{{ _secrets.redis_password }}' ping 2>&1
      register: _redis_check
      ignore_errors: true
      changed_when: false
      no_log: true
      when: _secrets.redis_password is defined

    - name: "Validation results"
      ansible.builtin.debug:
        msg: |
          {{ service_name }} secret validation:
            URL:      {{ 'VALID' if (_url_check is succeeded) else ('UNREACHABLE' if (_url_check is defined) else 'SKIPPED') }}
            Postgres: {{ 'VALID' if (_pg_check.rc | default(1) == 0) else ('INVALID' if (_pg_check is defined and _pg_check is not skipped) else 'SKIPPED') }}
            Redis:    {{ 'VALID' if ('PONG' in (_redis_check.stdout | default(''))) else ('INVALID' if (_redis_check is defined and _redis_check is not skipped) else 'SKIPPED') }}
