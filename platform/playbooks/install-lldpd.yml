---
# install-lldpd.yml — Install and configure lldpd on target hosts
#
# Installs the lldpd package, configures the system name and management
# address for LLDP advertisements, then enables and starts the service.
# Idempotent: safe to re-run.
#
# Usage: -e "target_service=proxmox_hosts"

- name: "Install lldpd on {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: true
  become: true
  vars:
    target_service: "ungrouped"

  tasks:
    - name: "Install lldpd package"
      ansible.builtin.apt:
        name: lldpd
        state: present
        update_cache: true

    - name: "Configure lldpd system name"
      ansible.builtin.copy:
        dest: /etc/lldpd.d/system.conf
        content: |
          configure system hostname {{ ansible_hostname }}
          configure system description "{{ ansible_distribution }} {{ ansible_distribution_version }} — {{ ansible_hostname }}"
        mode: "0644"
      notify: restart lldpd

    - name: "Enable and start lldpd"
      ansible.builtin.systemd:
        name: lldpd
        enabled: true
        state: started

    - name: "Wait for LLDP to collect neighbors"
      ansible.builtin.pause:
        seconds: 10

    - name: "Verify lldpd is running and has neighbors"
      ansible.builtin.command: lldpctl -f json0
      register: _lldp_check
      changed_when: false

    - name: "Show LLDP neighbor count"
      ansible.builtin.debug:
        msg: "lldpd running on {{ ansible_hostname }}. Output length: {{ _lldp_check.stdout | length }} bytes"

  handlers:
    - name: restart lldpd
      ansible.builtin.systemd:
        name: lldpd
        state: restarted
