---
# collect-lldp-topology.yml — Collect LLDP neighbors and push Cable entities to Diode
#
# Two-play playbook:
#   Play 1: SSH to all LLDP-capable hosts, run lldpctl -f json0, collect output
#   Play 2: On the NetBox host, aggregate neighbor data and push Cable entities
#
# Requires: lldpd installed on target hosts (see install-lldpd.yml)
#           Diode pipeline running on NetBox host
#
# Usage:
#   ansible-playbook collect-lldp-topology.yml \
#     -e "lldp_hosts=proxmox_hosts,pfsense_svc" \
#     -e "netbox_host=netbox_svc"
#
# Optional:
#   -e "dry_run=true"        — Log cables but don't push to Diode
#   -e "site_name=..."       — NetBox site (default: Uhstray.io Datacenter)

- name: "Collect LLDP neighbor data from all hosts"
  hosts: "{{ lldp_hosts | default('proxmox_hosts') }}"
  gather_facts: true
  become: true
  vars:
    lldp_hosts: "proxmox_hosts"

  tasks:
    - name: "Check if lldpctl is available"
      ansible.builtin.command: which lldpctl
      register: _lldpctl_check
      changed_when: false
      failed_when: false

    - name: "Collect LLDP neighbors (json0)"
      ansible.builtin.command: lldpctl -f json0
      register: _lldp_json
      changed_when: false
      when: _lldpctl_check.rc == 0

    - name: "Set LLDP data fact"
      ansible.builtin.set_fact:
        lldp_data: "{{ _lldp_json.stdout | default('{}') }}"
        lldp_hostname: "{{ ansible_hostname }}"
        lldp_fqdn: "{{ ansible_fqdn }}"
      when: _lldpctl_check.rc == 0

    - name: "Skip — lldpd not installed"
      ansible.builtin.debug:
        msg: "lldpctl not found on {{ ansible_hostname }} — skipping"
      when: _lldpctl_check.rc != 0


- name: "Push LLDP topology to Diode"
  hosts: "{{ netbox_host | default('netbox_svc') }}"
  gather_facts: false
  vars:
    netbox_host: "netbox_svc"
    site_name: "{{ discovery_site_name | default('Uhstray.io Datacenter') }}"
    dry_run: false
    diode_target: "grpc://localhost:8081/diode"

  tasks:
    - name: "Aggregate LLDP data from all hosts"
      ansible.builtin.set_fact:
        all_lldp_hosts: >-
          {{
            groups[lldp_hosts | default('proxmox_hosts')]
            | map('extract', hostvars)
            | selectattr('lldp_data', 'defined')
            | map(attribute='lldp_data')
            | list
          }}
        all_lldp_hostnames: >-
          {{
            groups[lldp_hosts | default('proxmox_hosts')]
            | map('extract', hostvars)
            | selectattr('lldp_hostname', 'defined')
            | map(attribute='lldp_hostname')
            | list
          }}

    - name: "Report collection results"
      ansible.builtin.debug:
        msg: "Collected LLDP data from {{ all_lldp_hostnames | length }} hosts: {{ all_lldp_hostnames | join(', ') }}"

    - name: "Parse LLDP data and push Cable entities to Diode"
      ansible.builtin.shell:
        cmd: |
          cat << 'PYSCRIPT' | python3 -
          import json
          import os
          import sys

          DRY_RUN = {{ dry_run | lower }}
          SITE_NAME = "{{ site_name }}"
          DIODE_TARGET = "{{ diode_target }}"

          # Collected LLDP data: list of json0 outputs, one per host
          raw_hosts = {{ all_lldp_hosts | to_json }}
          hostnames = {{ all_lldp_hostnames | to_json }}

          # Parse all LLDP neighbor relationships
          cables = []
          for i, raw in enumerate(raw_hosts):
              local_hostname = hostnames[i] if i < len(hostnames) else f"unknown-{i}"
              try:
                  data = json.loads(raw) if isinstance(raw, str) else raw
              except (json.JSONDecodeError, TypeError):
                  print(f"[lldp-topology] WARNING: Invalid JSON from {local_hostname}", file=sys.stderr)
                  continue

              # json0 format: {"lldp": [{"interface": [...]}]} or {"lldp": {"interface": [...]}}
              lldp_root = data.get("lldp", data)
              if isinstance(lldp_root, list):
                  interfaces = []
                  for item in lldp_root:
                      if isinstance(item, dict) and "interface" in item:
                          ifaces = item["interface"]
                          if isinstance(ifaces, list):
                              interfaces.extend(ifaces)
                          elif isinstance(ifaces, dict):
                              interfaces.append(ifaces)
              elif isinstance(lldp_root, dict) and "interface" in lldp_root:
                  ifaces = lldp_root["interface"]
                  interfaces = ifaces if isinstance(ifaces, list) else [ifaces]
              else:
                  interfaces = []

              for iface_entry in interfaces:
                  if not isinstance(iface_entry, dict):
                      continue

                  # Extract local interface name
                  local_port = iface_entry.get("name", "")
                  if not local_port:
                      for key in iface_entry:
                          if key not in ("chassis", "port", "via", "age", "rid"):
                              local_port = key
                              break

                  # Extract neighbor (chassis) data
                  chassis_list = iface_entry.get("chassis", [])
                  if isinstance(chassis_list, dict):
                      chassis_list = [chassis_list]

                  port_list = iface_entry.get("port", [])
                  if isinstance(port_list, dict):
                      port_list = [port_list]

                  for ci, chassis in enumerate(chassis_list):
                      if not isinstance(chassis, dict):
                          continue

                      # Remote device name — try multiple fields
                      remote_name = ""
                      for name_key in ("name", "SysName"):
                          if isinstance(chassis.get(name_key), list):
                              for item in chassis[name_key]:
                                  if isinstance(item, dict) and "value" in item:
                                      remote_name = item["value"]
                                      break
                          elif isinstance(chassis.get(name_key), dict):
                              remote_name = chassis[name_key].get("value", "")
                          elif isinstance(chassis.get(name_key), str):
                              remote_name = chassis[name_key]
                          if remote_name:
                              break

                      # Remote management IP
                      remote_mgmt_ip = ""
                      mgmt = chassis.get("mgmt-ip", chassis.get("MgmtIP", []))
                      if isinstance(mgmt, list):
                          for item in mgmt:
                              if isinstance(item, dict) and "value" in item:
                                  remote_mgmt_ip = item["value"]
                                  break
                              elif isinstance(item, str):
                                  remote_mgmt_ip = item
                                  break
                      elif isinstance(mgmt, dict):
                          remote_mgmt_ip = mgmt.get("value", "")
                      elif isinstance(mgmt, str):
                          remote_mgmt_ip = mgmt

                      # Remote port name
                      remote_port = ""
                      port = port_list[ci] if ci < len(port_list) else (port_list[0] if port_list else {})
                      if isinstance(port, dict):
                          # Try port id first, then descr
                          port_id = port.get("id", {})
                          if isinstance(port_id, dict):
                              remote_port = port_id.get("value", "")
                          elif isinstance(port_id, list):
                              for item in port_id:
                                  if isinstance(item, dict) and "value" in item:
                                      remote_port = item["value"]
                                      break
                          elif isinstance(port_id, str):
                              remote_port = port_id

                          if not remote_port:
                              port_descr = port.get("descr", {})
                              if isinstance(port_descr, dict):
                                  remote_port = port_descr.get("value", "")
                              elif isinstance(port_descr, str):
                                  remote_port = port_descr

                      if not remote_name and not remote_mgmt_ip:
                          continue
                      if not local_port or not remote_port:
                          continue

                      cables.append({
                          "local_device": local_hostname,
                          "local_port": local_port,
                          "remote_device": remote_name,
                          "remote_mgmt_ip": remote_mgmt_ip,
                          "remote_port": remote_port,
                      })

          print(f"[lldp-topology] Parsed {len(cables)} cable relationships")
          for c in cables:
              print(f"  {c['local_device']}:{c['local_port']} <-> {c['remote_device']}:{c['remote_port']}")

          if DRY_RUN:
              print("[lldp-topology] DRY RUN — not pushing to Diode")
              sys.exit(0)

          if not cables:
              print("[lldp-topology] No cables to push")
              sys.exit(0)

          # Read Diode credentials from orb-agent secrets
          client_id = ""
          client_secret = ""
          secrets_dir = os.path.expanduser("~/services/netbox/secrets")
          try:
              with open(os.path.join(secrets_dir, "orb_agent_client_id.txt")) as f:
                  client_id = f.read().strip()
              with open(os.path.join(secrets_dir, "orb_agent_client_secret.txt")) as f:
                  client_secret = f.read().strip()
          except FileNotFoundError:
              print("[lldp-topology] ERROR: Cannot read Diode credentials from secrets/", file=sys.stderr)
              sys.exit(1)

          from netboxlabs.diode.sdk import DiodeClient
          from netboxlabs.diode.sdk.ingester import (
              Cable, Device, DeviceType, Entity, GenericObject, Interface,
              Manufacturer, Site,
          )

          MANUFACTURER_DEFAULT = "Generic"
          MODEL_DEFAULT = "LLDP Neighbor"

          def device_ref(name):
              return Device(
                  name=name,
                  device_type=DeviceType(
                      model=MODEL_DEFAULT,
                      manufacturer=Manufacturer(name=MANUFACTURER_DEFAULT),
                  ),
                  site=Site(name=SITE_NAME),
              )

          entities = []
          for c in cables:
              a_dev = device_ref(c["local_device"])
              b_dev = device_ref(c["remote_device"]) if c["remote_device"] else device_ref(c["remote_mgmt_ip"])

              a_term = GenericObject(
                  object_interface=Interface(name=c["local_port"], device=a_dev)
              )
              b_term = GenericObject(
                  object_interface=Interface(name=c["remote_port"], device=b_dev)
              )
              cable = Cable(
                  a_terminations=[a_term],
                  b_terminations=[b_term],
                  status="connected",
                  description="Discovered via LLDP",
              )
              entities.append(Entity(cable=cable))

          with DiodeClient(
              target=DIODE_TARGET,
              app_name="lldp-topology",
              app_version="1.0.0",
              client_id=client_id,
              client_secret=client_secret,
          ) as client:
              resp = client.ingest(entities=entities)
              if resp.errors:
                  print(f"[lldp-topology] Diode errors: {resp.errors}", file=sys.stderr)
              else:
                  print(f"[lldp-topology] Pushed {len(entities)} Cable entities to Diode")

          PYSCRIPT
      register: _push_result
      changed_when: false

    - name: "Show results"
      ansible.builtin.debug:
        msg: "{{ _push_result.stdout_lines | default([]) }}"

    - name: "Show errors (if any)"
      ansible.builtin.debug:
        msg: "{{ _push_result.stderr_lines | default([]) }}"
      when: _push_result.stderr_lines | default([]) | length > 0
