---
# check-secrets.yml — Read-only secret inventory from OpenBao
#
# Lists all secrets for a service. Reports present, missing, empty.
# Does NOT generate or modify anything.
#
# Usage: -e "target_service=netbox_svc"

- name: "Check secrets for {{ target_service | default('(unset)') }}"
  hosts: "{{ target_service }}"
  gather_facts: false
  become: false
  vars:
    target_service: "ungrouped"
    _bao_url: "{{ openbao_addr | default('') }}"
    _bao_role_id: "{{ bao_role_id | default(lookup('env', 'BAO_ROLE_ID')) }}"
    _bao_secret_id: "{{ bao_secret_id | default(lookup('env', 'BAO_SECRET_ID')) }}"

  tasks:
    - name: "Authenticate to OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ _bao_role_id }}"
          secret_id: "{{ _bao_secret_id }}"
        status_code: [200]
      register: _bao_auth
      delegate_to: localhost
      no_log: true

    - name: "Fetch secrets from OpenBao"
      ansible.builtin.uri:
        url: "{{ _bao_url }}/v1/secret/data/services/{{ service_name }}"
        method: GET
        headers:
          X-Vault-Token: "{{ _bao_auth.json.auth.client_token }}"
        status_code: [200, 404]
      register: _bao_data
      delegate_to: localhost
      no_log: true

    - name: "Report secrets"
      ansible.builtin.debug:
        msg: |
          {{ service_name }} secrets in OpenBao:
          {% if _bao_data.status == 404 %}
            NO SECRETS FOUND at secret/services/{{ service_name }}
          {% else %}
          {% for key, value in (_bao_data.json.data.data | default({})) | dictsort %}
            {{ '  PRESENT' if value | length > 0 else '  EMPTY  ' }}  {{ key }}
          {% endfor %}
            Total: {{ _bao_data.json.data.data | default({}) | length }} keys
          {% endif %}
