services:
  nocodb:
    depends_on:
      nocodb-postgres:
        condition: service_healthy
    env_file:
      - ./config/nocodb.env
    image: docker.io/nocodb/nocodb:latest
    container_name: workflow-nocodb
    ports:
      - "${NOCODB_LISTEN:-127.0.0.1}:8181:8080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - nc_data:/usr/app/data

  nocodb-postgres:
    container_name: workflow-nocodb-postgres
    image: docker.io/postgres:16.6
    ports:
      - "${NOCODB_PG_LISTEN:-127.0.0.1}:5433:5432"
    env_file:
      - ./config/nocodb.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocodb} -d ${POSTGRES_DB:-nocodb}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  nc_data:
  db_data:
